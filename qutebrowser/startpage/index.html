<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #101010;
            color: #deeeed;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            /* This centers everything horizontally */
            align-items: center;
            /* This centers everything vertically */
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #searchbox {
            background: #191919;
            border: 1px solid #3A3A3A;
            color: #deeeed;
            padding: 12px;
            width: 400px;
            border-radius: 4px;
            outline: none;
            margin-bottom: 30px;
            /* This ensures text stays on the left while inside the box */
            text-align: left;
        }
        #searchbox:focus { border: 1px solid #7788AA; }
        
        .links { 
            display: flex; 
            gap: 25px; 
            flex-wrap: wrap; 
            justify-content: center;
        }
        a { 
            color: #7788AA; 
            text-decoration: none; 
            font-size: 0.9em;
        }
        a:hover { 
            color: #ffaa88; 
            text-decoration: underline; 
        }
    </style>
    <script>
        function search(event) {
            if (event.key === 'Enter') {
                const query = document.getElementById('searchbox').value;
                window.location.href = 'https://duckduckgo.com/?q=' + encodeURIComponent(query);
            }
        }
    </script>
</head>
<body>
    <input type="text" id="searchbox" placeholder="Search..." autofocus onkeydown="search(event)">
    
    <div class="links">
        <a href="https://wiki.archlinux.org/">ArchWiki</a>
        <a href="https://github.com/">GitHub</a>
        <a href="https://reddit.com/">Reddit</a>
        <a href="https://youtube.com/">YouTube</a>
    </div>
</body>
</html>
